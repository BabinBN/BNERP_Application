_schema-version: 3.3.0
ID: ERP_Application
description: A simple CAP project.
version: 1.0.0-SNAPSHOT
modules:
- name: ERP_Application-srv
  type: java
  path: srv
  properties:
    JBP_CONFIG_COMPONENTS: 'jres: [''com.sap.xs.java.buildpack.jre.SAPMachineJRE'']'
    JBP_CONFIG_SAP_MACHINE_JRE: '{ version: 21.+ }'
    SPRING_PROFILES_ACTIVE: cloud,sandbox
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: sap_java_buildpack_jakarta
    instances: 1
  build-parameters:
    build-result: target/*-exec.jar
    builder: custom
    commands:
    - mvn clean package -DskipTests=true --batch-mode
- name: ERP_Application-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: ERP_Application-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - purchaseorder.zip
      name: purchaseorder
      target-path: resources/
- name: purchaseorder
  type: html5
  path: app/purchase_order
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: ERP_Application-destination-content
  type: com.sap.application.content
  requires:
  - name: ERP_Application-destination-service
    parameters:
      content-target: true
  - name: ERP_Application-repo-host
    parameters:
      service-key:
        name: ERP_Application-repo-host-key
  - name: uaa_ERP_Application
    parameters:
      service-key:
        name: uaa_ERP_Application-key
  parameters:
    content:
      instance:
        destinations:
        - Name: ERP_ERP_Application_repo_host
          ServiceInstanceName: ERP_Application-html5-service
          ServiceKeyName: ERP_Application-repo-host-key
          sap.cloud.service: ERP
        - Authentication: OAuth2UserTokenExchange
          Name: ERP_uaa_ERP_Application
          ServiceInstanceName: ERP_Application-xsuaa-service
          ServiceKeyName: uaa_ERP_Application-key
          sap.cloud.service: ERP
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
resources:
- name: ERP_Application-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: ERP_Application-html5-service
    service-plan: app-host
- name: ERP_Application-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      version: 1.0.0
    service: destination
    service-name: ERP_Application-destination-service
    service-plan: lite
- name: uaa_ERP_Application
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: ERP_Application-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
